aid: american-family-insurance
url: https://raw.githubusercontent.com/api-evangelist/american-family-insurance/refs/heads/main/apis.yml
name: American Family Insurance
description: >-
  American Family Insurance is a private mutual company that offers auto, homeowners,
  life, renters, umbrella, business, and farm/ranch insurance throughout the United States.
  The company serves customers through a network of exclusive agents, digital tools including
  the MyAmFam mobile app, and online self-service capabilities. American Family is headquartered
  in Madison, Wisconsin, and is one of the largest property-casualty insurers in the country.
