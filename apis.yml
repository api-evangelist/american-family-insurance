apis: []
common:
  - type: Website
    url: https://www.amfam.com
  - type: Portal
    url: https://b2b.amfam.com
    name: American Family B2B Portal
  - type: Features
    data:
      - name: Auto Insurance
        description: >-
          Customizable auto insurance coverage including liability, collision, comprehensive,
          uninsured motorist, and roadside assistance for personal and commercial vehicles.
      - name: Home Insurance
        description: >-
          Homeowners insurance protecting against property damage, personal liability,
          and loss of use, with optional coverage for valuables and natural disasters.
      - name: Life Insurance
        description: >-
          Term, whole, and universal life insurance products providing financial protection
          and wealth accumulation options for families and individuals.
      - name: Business Insurance
        description: >-
          Small business and commercial insurance covering property, liability, workers
          compensation, and professional liability for business owners.
      - name: Multi-Policy Bundling
        description: >-
          Discount programs allowing customers to save up to 40% by bundling home and
          auto insurance policies together.
      - name: MyAmFam Digital App
        description: >-
          Mobile app with 4.7-star rating enabling policy management, claims filing,
          bill payment, digital ID cards, and agent communication for customers.
      - name: Online Claims Management
        description: >-
          Digital claims filing and tracking tools allowing customers to report claims,
          upload documentation, and monitor claim status online and via mobile app.
      - name: Lender Services Portal
        description: >-
          B2B portal for mortgage lenders and financial institutions to verify insurance
          coverage, manage escrow billing, and coordinate insurance requirements.
  - type: UseCases
    data:
      - name: Personal Auto and Home Protection
        description: >-
          Protecting personal vehicles and homes from accidents, theft, weather damage,
          and liability claims through bundled personal lines insurance policies.
      - name: Small Business Coverage
        description: >-
          Covering small business operations against property damage, general liability,
          professional liability, and workers compensation claims.
      - name: Life Insurance Planning
        description: >-
          Providing financial security for families through life insurance products that
          replace income and cover expenses in the event of the policyholder's death.
      - name: Mortgage Lender Insurance Verification
        description: >-
          Enabling mortgage lenders to verify homeowners insurance coverage requirements
          are met and manage escrow-based insurance premium payments.
      - name: Digital Self-Service
        description: >-
          Allowing customers to manage their entire insurance relationship digitally through
          the MyAmFam app and online portal without requiring agent interaction.
  - type: Integrations
    data:
      - name: Mortgage Lender Systems
        description: >-
          B2B integration with mortgage servicers and lenders for insurance verification,
          escrow billing, and lender-placed insurance coordination.
      - name: Agent Management Platforms
        description: >-
          Integration with exclusive agent tools for policy quoting, binding, and
          customer management across all lines of business.
